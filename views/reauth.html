<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{{title}}</title>
    <meta name="description" content="{{title}}">
    <link id="favicon" rel="icon" href="favicon.svg" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/bundle.css">
    <link rel="stylesheet" href="/bundle-css.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <script src="components-bundle.js"></script>
  </head>
  <body>
    <mdui-top-app-bar style="position: relative;">
      <mdui-top-app-bar-title>{{title}}</mdui-top-app-bar-title>
      <a href="https://github.com/GoogleChromeLabs/passkeys-codelab"><mdui-button-icon icon="code"></mdui-button-icon></a>
    </mdui-top-app-bar>
    <mdui-linear-progress id="progress" class="hidden"></mdui-linear-progress>
    <main class="content center">
      <form id="form" method="POST" action="/auth/password" class="center">
        <h2>
          Enter a password
        </h2>
        <mdui-text-field name="username" value="{{username}}" class="hidden"></mdui-text-field>
        <mdui-text-field
          id="password"
          label="Password"
          type="password"
          name="password"
          autocomplete="current-password"
          toggle-password
          value="f2xELEPgKpuz"
          autofocus></mdui-text-field>
        <p class="instructions">password will be ignored in this demo.</p>
        <mdui-button type="submit" value="Sign-In">Sign-In</mdui-button>
      </form>
    </main>
    <script type="module">
      import { $, _fetch } from '/client.js';
      
      const form = $('#form');
      form.addEventListener('submit', e => {
        e.preventDefault();
        const form = new FormData(e.target);
        const cred = {};
        form.forEach((v, k) => cred[k] = v);
        _fetch(e.target.action, cred)
        .then(user => {
          location.href = '/home';
        })
        .catch(e => alert(e));
      });
    </script>
  </body>
</html>
