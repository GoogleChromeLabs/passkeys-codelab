<!DOCTYPE html>
<html lang="en">

<head>
  <title>{{title}}</title>
  <meta name="description" content="{{title}}">
  <link id="favicon" rel="icon"
    href="favicon.svg"
    type="image/x-icon">
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/bundle.css">
  <link rel="stylesheet" href="/bundle-css.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <script src="components-bundle.js"></script>
</head>

<body>
  <mdui-top-app-bar style="position: relative;">
    <mdui-top-app-bar-title>{{title}}</mdui-top-app-bar-title>
    <a href="https://github.com/GoogleChromeLabs/passkeys-codelab"><mdui-button-icon icon="code"></mdui-button-icon></a>
  </mdui-top-app-bar>
  <mdui-linear-progress id="progress" class="hidden"></mdui-linear-progress>
  <main class="content center">
    <h2>
      Enter a username
    </h2>
    <form id="form" method="POST" action="/auth/username" class="center">
      <mdui-text-field id="username" label="Username" name="username" autocomplete="username webauthn"
        autofocus></mdui-text-field>
      <div class="hidden">
        <mdui-text-field id="password" label="Password" type="password" name="password" autocomplete="current-password"
          toggle-password autofocus></mdui-text-field>
      </div>
      <p class="instructions">Any username can be accepted.</p>
      <mdui-button type="submit" value="Next">Next</mdui-button>
    </form>
    <script type="module">
      // TODO: Add passkeys to the browser autofill: Detect features, invoke WebAuthn, and enable a conditional UI.
      import {
        $,
        _fetch,
        loading,
        authenticate
      } from '/client.js';

      const form = $('#form');
      form.addEventListener('submit', async s => {
        s.preventDefault();
        const form = new FormData(s.target);
        const cred = {};
        form.forEach((v, k) => cred[k] = v);
        _fetch(s.target.action, cred)
          .then(user => {
            location.href = '/reauth';
          }).catch(e => {
            loading.stop();
            console.error(e.message);
            alert(e);
          });
      });

      // TODO: Add passkeys to the browser autofill: Detect features, invoke WebAuthn, and enable a conditional UI.

      // Is WebAuthn available on this browser?
      if (window.PublicKeyCredential &&
        PublicKeyCredential.isConditionalMediationAvailable) {
        try {
          // Is conditional UI available in this browser?
          const cma = await PublicKeyCredential.isConditionalMediationAvailable();
          if (cma) {
            // If conditional UI is available, invoke the authenticate() function.
            const user = await authenticate();
            if (user) {
              // Proceed only when authentication succeeds.
              $('#username').value = user.username;
              loading.start();
              location.href = '/home';
            } else {
              throw new Error('User not found.');
            }
          }
        } catch (e) {
          loading.stop();
          // A NotAllowedError indicates that the user canceled the operation.
          if (e.name !== 'NotAllowedError') {
            console.error(e);
            alert(e.message);
          }
        }
      }

    </script>
  </main>
</body>

</html>
